# Build + deploy the Next.js front (web/) to Azure Static Web Apps
# (resource: insultai-demo-web, custom domain: iai.bernarduriza.com).
#
# Triggered on push to master that touches web/ (or this workflow itself),
# plus a manual workflow_dispatch escape hatch. The API (api/) lives in a
# separate Azure Container App and isn't deployed here.
#
# Why we build manually instead of letting the Azure action's Oryx builder
# do it: Oryx's Next.js detection lags new releases (Next 16 + Turbopack
# isn't always supported), and our static-export config (output: "export")
# is more reliably handled by a vanilla `npm ci && npm run build` step.
# skip_app_build: true tells the action to just upload web/out as-is.
name: Deploy web to Azure Static Web Apps

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/azure-static-web-apps.yml"
  workflow_dispatch:

# Cancel an older in-flight deploy when a newer push lands — we only ever
# want master to converge on the latest commit, not race two deploys.
concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      # Cache Next.js's incremental build directory so consecutive builds
      # (post-cache) drop from ~50s to ~15s. Key buckets:
      #   - package-lock.json change → fresh cache (deps moved, old cache stale)
      #   - source change w/ same lockfile → restore-keys lets us inherit the
      #     previous build's cache and only recompile what changed.
      # See https://nextjs.org/docs/app/guides/ci-build-caching
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx', 'web/**/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-

      # NEXT_PUBLIC_* is inlined at build time, not read at runtime — so the
      # API URL and the X-API-Key gate MUST be set before `next build` runs,
      # otherwise the production bundle defaults to http://localhost:8080
      # and forgets to send the X-API-Key header (the API will 401). The
      # URL is a repo VARIABLE (it's already public DNS); the key is a repo
      # SECRET (no logs of its value, even though it ships in the bundle).
      - name: Build (next build → web/out)
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # Quirk: when skip_app_build is true, the action ignores
          # output_location and treats app_location as the artifact root
          # (it greps app_location for index.html). So we point straight
          # at web/out — the directory `next build` already populated.
          app_location: web/out
          skip_app_build: true
