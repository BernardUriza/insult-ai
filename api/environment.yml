# insult_ai backend — conda-native (no PyPI-only; matches the fi-* stack).
name: insult-ai
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - nodejs>=22,<23          # for the npm CLIs: claude-code, codex, brightdata/mcp
  - pip
  - pip:
      # fi-runner + fi-core live in the free-intelligence monorepo (MIT). Neither
      # is on PyPI, so install both from git. We track the `dev` branch because it
      # carries the tool-trace (TurnResult.tool_calls) the bench needs — not yet
      # merged to main. fi-core MUST come before fi-runner (pip resolves
      # fi-runner's fi-core dep from this explicit URL).
      # LOCAL/dev pin: `@dev` is a MOVING branch. For deploy, pin a tag/SHA (or
      # switch to main once dev lands there) so the image is reproducible.
      # RAG store backends — both extras ship in the env so a switch between
      # FI_RAG_BACKEND=hdf5 (local dev / single-process) and =pgvector (deploy /
      # multi-replica) is just an env var, no rebuild. ~5MB extra for asyncpg
      # + pgvector — cheap vs the cost of maintaining two images.
      #   - [stores-hdf5]: h5py + numpy — single-file persistent backend.
      #   - [stores-pgvector]: asyncpg + pgvector — Postgres backend with
      #     concurrent writers + relational filters. The deploy path.
      - "fi-core[stores-hdf5,stores-pgvector] @ git+https://github.com/BernardUriza/free-intelligence.git@dev#subdirectory=apps/packages/fi-core"
      # [claude,codex]: the phantom `openai-codex` dep was dropped on dev (the
      # codex extra is now empty), so both backends install clean — paridad as
      # architecture.md wants. CodexBackend still drives the `codex` npm CLI.
      - "fi-runner[claude,codex] @ git+https://github.com/BernardUriza/free-intelligence.git@dev#subdirectory=apps/packages/fi-runner"
      - fastapi
      - "uvicorn[standard]"
      # Per-IP rate limiting on the agent endpoints (/roast, /chat/stream).
      # The $250 Bright Data credit + per-turn Claude tokens make an unauth'd
      # public URL a money funnel for any bot that finds it — slowapi is the
      # cheap floor under that risk. Bearer token check sits ON TOP.
      - "slowapi>=0.1.9"
