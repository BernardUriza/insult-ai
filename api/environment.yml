# insult_ai backend — conda-native (no PyPI-only; matches the fi-* stack).
name: insult-ai
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - nodejs>=22,<23          # for the npm CLIs: claude-code, codex, brightdata/mcp
  - pip
  - pip:
      # fi-runner 0.8.0 has Runner.extra_mcp_servers (needed below). It's only
      # 0.3.0 on the bernardurizaorozco Anaconda channel today, so pull main
      # from git for now. Once 0.8.0 is published to conda, swap this for:
      #   - bernardurizaorozco::fi-runner   (move up into `dependencies`)
      # fi-runner depends on fi-core, which is NOT on PyPI either — it's a sibling
      # package in the same monorepo. Declare it explicitly from git so pip can
      # resolve fi-runner's `fi-core` dependency. Must come BEFORE fi-runner.
      - "fi-core @ git+https://github.com/BernardUriza/free-intelligence.git@main#subdirectory=apps/packages/fi-core"
      # NOTE: we install only the [claude] extra, NOT [claude,codex]. The `codex`
      # extra declares `openai-codex>=0.1`, a package that does NOT exist on PyPI
      # (upstream fi-runner bug). It's also unused: CodexBackend shells out to the
      # `codex` npm CLI (`codex exec --json`) — it imports no Python codex package.
      # So the codex backend STILL works via the npm CLI; we just don't pull a
      # phantom dep. TODO: report upstream + restore [claude,codex] once fixed.
      - "fi-runner[claude] @ git+https://github.com/BernardUriza/free-intelligence.git@main#subdirectory=apps/packages/fi-runner"
      - fastapi
      - "uvicorn[standard]"
